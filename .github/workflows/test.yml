name: R Tests

# Repo-root CI for the testthat unit suite. Closes #7: the comprehensive matrix
# workflow under MarineSABRES_SES_Shiny/.github/workflows/test.yml never ran
# because GitHub Actions only reads workflows from the repository root. This is a
# lean single-target version (ubuntu + R 4.4, no E2E/coverage) chosen to keep the
# R dependency install (~40 CRAN packages) tractable; expand the matrix later if
# CI time allows.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: testthat unit suite
    runs-on: ubuntu-22.04   # matches the posit jammy binary repo used below
    defaults:
      run:
        working-directory: MarineSABRES_SES_Shiny
    env:
      R_KEEP_PKG_SOURCE: "no"
    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            libglpk-dev libgmp-dev
        shell: bash

      - name: Install R dependencies
        run: |
          # Use the project's canonical package list — it parses global.R's
          # library() calls (so it never drifts) plus a fixed augment set, and
          # excludes the optional torch. Posit binary repo => fast, no compiling.
          options(repos = c(CRAN = "https://packagemanager.posit.co/cran/__linux__/jammy/latest"))
          source("deployment/required_packages.R")  # defines REQUIRED_PACKAGES
          install.packages(c(REQUIRED_PACKAGES, "testthat"))
          have <- rownames(installed.packages())
          missing <- setdiff(c(REQUIRED_PACKAGES, "testthat"), have)
          if (length(missing)) stop("Failed to install: ", paste(missing, collapse = ", "))
          cat("Installed", length(REQUIRED_PACKAGES), "required packages.\n")
        shell: Rscript {0}

      - name: Prepare test fixtures
        run: |
          dir.create("data", showWarnings = FALSE)
          fx <- list.files("tests/fixtures/templates", pattern = "\\.json$", full.names = TRUE)
          if (length(fx) > 0) file.copy(fx, "data", overwrite = TRUE)
          message(sprintf("Fixtures copied: %d", length(fx)))
        shell: Rscript {0}

      - name: Run testthat suite
        run: |
          library(testthat)
          # Use test_dir (the project's canonical runner): it loads the
          # helper-00 -> global.R chain ONCE with the correct working directory,
          # so global.R's translation-merge cache writes successfully (a per-file
          # loop re-sources global.R at the wrong wd and the cache write fails ->
          # partial load -> spurious errors). shinytest2 E2E tests skip on CI
          # automatically (the runner sets CI=true).
          res <- test_dir("tests/testthat", reporter = "summary", stop_on_failure = FALSE)
          df <- as.data.frame(res)
          cat(sprintf("\n=== TOTAL: FAIL=%d ERROR=%d PASS=%d SKIP=%d ===\n",
                      sum(df$failed), sum(df$error %||% FALSE), sum(df$passed), sum(df$skipped)))
          bad <- df[df$failed > 0 | (if ("error" %in% names(df)) df$error else FALSE), , drop = FALSE]
          if (nrow(bad) > 0) {
            cat("Files with failures/errors:\n")
            print(bad[, intersect(c("file","failed","error","skipped","passed"), names(bad))])
            stop("Test failures present")
          }
          cat("All tests passed.\n")
        shell: Rscript {0}
        env:
          CI: "true"
