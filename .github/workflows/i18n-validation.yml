name: i18n validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-translations:
    name: Validate translations and reports
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MarineSABRES_SES_Shiny
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run i18n audit
        run: |
          set -e
          python scripts/_i18n_audit.py

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-audit-report
          path: MarineSABRES_SES_Shiny/.claude/skills/scientific-validation-workspace/codebase-audit/i18n-audit-report.md

      - name: Fail on missing or hardcoded keys
        run: |
          set -e
          REPORT=".claude/skills/scientific-validation-workspace/codebase-audit/i18n-audit-report.md"
          if [ ! -f "$REPORT" ]; then
            echo "Audit report not found"
            exit 1
          fi
          TOTALS=$(grep -E "^Totals:" "$REPORT" | head -1)
          echo "$TOTALS"
          if echo "$TOTALS" | grep -qE "missing=[1-9][0-9]*"; then
            echo "ERROR: Missing i18n keys detected"
            cat "$REPORT"
            exit 1
          fi
          if echo "$TOTALS" | grep -qE "hardcoded=[1-9][0-9]*"; then
            echo "ERROR: Hardcoded strings detected"
            cat "$REPORT"
            exit 1
          fi
          echo "i18n audit passed: $TOTALS"

  i18n-tests:
    name: Run i18n enforcement tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MarineSABRES_SES_Shiny
    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev

      - name: Install test dependencies
        run: |
          R -e "install.packages(c('testthat','jsonlite'), repos='https://cloud.r-project.org')"

      - name: Run i18n enforcement test
        run: |
          Rscript -e "testthat::test_file('tests/testthat/test-i18n-enforcement.R')"
