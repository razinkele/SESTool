name: i18n validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: "i18n-validation-${{ github.ref }}"
  cancel-in-progress: true

defaults:
  run:
    working-directory: MarineSABRES_SES_Shiny

jobs:
  validate-translations:
    name: Validate translations and reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run i18n audit
        run: |
          set -e
          python scripts/_i18n_audit.py

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-audit-report
          path: MarineSABRES_SES_Shiny/.claude/skills/scientific-validation-workspace/codebase-audit/i18n-audit-report.md

      - name: Fail on missing or hardcoded keys
        run: |
          set -e
          REPORT=".claude/skills/scientific-validation-workspace/codebase-audit/i18n-audit-report.md"
          if [ ! -f "$REPORT" ]; then
            echo "Audit report not found"
            exit 1
          fi
          TOTALS=$(grep -E "^Totals:" "$REPORT" | head -1)
          echo "$TOTALS"
          if echo "$TOTALS" | grep -qE "missing=[1-9][0-9]*"; then
            echo "ERROR: Missing i18n keys detected"
            cat "$REPORT"
            exit 1
          fi
          if echo "$TOTALS" | grep -qE "hardcoded=[1-9][0-9]*"; then
            echo "ERROR: Hardcoded strings detected"
            cat "$REPORT"
            exit 1
          fi
          echo "i18n audit passed: $TOTALS"

  i18n-tests:
    name: Run i18n enforcement tests
    runs-on: ubuntu-latest
    env:
      R_LIBS_USER: ${{ runner.temp }}/Rlibs
    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-packages-${{ hashFiles('**/scripts/*.R') }}-v1
          restore-keys: |
            ${{ runner.os }}-r-packages-

      - name: Install test dependencies
        run: |
          R -e "pkgs <- c('testthat'); toinstall <- pkgs[!pkgs %in% installed.packages()[,'Package']]; if(length(toinstall)) install.packages(toinstall, repos='https://cloud.r-project.org')"

      - name: Run i18n enforcement test (capture output)
        run: |
          set -o pipefail
          Rscript -e "testthat::test_file('tests/testthat/test-i18n-enforcement.R')" 2>&1 | tee i18n_tests_output.txt

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-test-logs
          path: MarineSABRES_SES_Shiny/i18n_tests_output.txt

      - name: Fail if tests failed
        run: |
          if grep -q "FAIL" i18n_tests_output.txt; then
            echo "i18n tests reported FAIL. See artifact 'i18n-test-logs' for details."
            exit 1
          fi
