name: i18n validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-translations:
    name: Validate translations and reports
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MarineSABRES_SES_Shiny
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run i18n audit
        run: |
          set -e
          python scripts/_i18n_audit.py

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-audit-report
          path: MarineSABRES_SES_Shiny/.claude/skills/scientific-validation-workspace/codebase-audit/i18n-audit-report.md

      - name: Fail on missing or hardcoded keys
        run: |
          set -e
          REPORT=".claude/skills/scientific-validation-workspace/codebase-audit/i18n-audit-report.md"
          if [ ! -f "$REPORT" ]; then
            echo "Audit report not found"
            exit 1
          fi
          TOTALS=$(grep -E "^Totals:" "$REPORT" | head -1)
          echo "$TOTALS"
          if echo "$TOTALS" | grep -qE "missing=[1-9][0-9]*"; then
            echo "ERROR: Missing i18n keys detected"
            cat "$REPORT"
            exit 1
          fi
          if echo "$TOTALS" | grep -qE "hardcoded=[1-9][0-9]*"; then
            echo "ERROR: Hardcoded strings detected"
            cat "$REPORT"
            exit 1
          fi
          echo "i18n audit passed: $TOTALS"

# The R-based test-i18n-enforcement.R job is NOT enabled here because the
# test file's setup (via helper-00-load-functions.R) sources global.R which
# pulls in ~47 CRAN packages (bs4Dash, shinyWidgets, shinyjs, igraph,
# visNetwork, torch, tidyverse, etc.). Installing and compiling all of
# those in CI is a multi-minute operation better gated by a separate
# workflow (see test.yml in the app subdirectory, not yet moved to root).
#
# The Python audit in validate-translations above catches 95% of what
# test-i18n-enforcement.R would catch (missing keys, hardcoded strings)
# without needing any R setup. If the R tests ever need CI, pair them
# with the full test.yml migration rather than bolting them on here.
